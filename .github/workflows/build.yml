name: Build & Push ECR

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pipelines/**'
      - 'Dockerfile'
      - 'requirements*.txt'
      - 'cloudformation/**'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      model: ${{ steps.filter.outputs.model }}
    steps:
      - uses: actions/checkout@v4
      - name: Check model-relevant paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            model:
              - 'src/**'
              - 'pipelines/**'
              - 'Dockerfile'
              - 'requirements*.txt'

  build:
    name: Build and push Docker image to ECR
    needs: detect-changes
    if: needs.detect-changes.outputs.model == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: mlops-toxic
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"
          LATEST_URI="$ECR_REGISTRY/$ECR_REPO:latest"

          docker build -t "$IMAGE_URI" -t "$LATEST_URI" .
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "Built and pushed: $IMAGE_URI"

  trigger-deploy:
    name: Trigger deploy workflow
    needs: [detect-changes, build]
    if: |
      always() &&
      !failure() && !cancelled() &&
      (needs.detect-changes.outputs.model == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/deploy.yml
    with:
      image_uri: ${{ needs.build.outputs.image_uri }}
      retrain: true
    secrets: inherit

  trigger-deploy-infra-only:
    name: Trigger infra-only deploy
    needs: [detect-changes, build]
    if: |
      always() &&
      !failure() && !cancelled() &&
      needs.detect-changes.outputs.model == 'false' &&
      github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/deploy.yml
    with:
      image_uri: ''
      retrain: false
    secrets: inherit
