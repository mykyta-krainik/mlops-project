AWSTemplateFormatVersion: '2010-09-09'
Description: Container registry - ECR repositories for all container images

Parameters:
  ProjectName:
    Type: String
    Default: mlops-toxic
    Description: Project name prefix for resources

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name

Resources:
  TrainingRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-${Environment}-training
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-training

  InferenceRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-${Environment}-inference
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-inference

  DataPreparationRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-${Environment}-lambda-data-prep
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-lambda-data-prep

  ModelPromotionRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-${Environment}-lambda-model-promotion
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-lambda-model-promotion

Outputs:
  TrainingRepositoryUri:
    Description: ECR Repository URI for training container
    Value: !GetAtt TrainingRepository.RepositoryUri
    Export:
      Name: !Sub ${ProjectName}-${Environment}-TrainingRepoUri

  InferenceRepositoryUri:
    Description: ECR Repository URI for inference container
    Value: !GetAtt InferenceRepository.RepositoryUri
    Export:
      Name: !Sub ${ProjectName}-${Environment}-InferenceRepoUri

  DataPreparationRepositoryUri:
    Description: ECR Repository URI for data preparation Lambda
    Value: !GetAtt DataPreparationRepository.RepositoryUri
    Export:
      Name: !Sub ${ProjectName}-${Environment}-DataPrepRepoUri

  ModelPromotionRepositoryUri:
    Description: ECR Repository URI for model promotion Lambda
    Value: !GetAtt ModelPromotionRepository.RepositoryUri
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ModelPromotionRepoUri
