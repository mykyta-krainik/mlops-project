      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-evidently-drift

  # EventBridge Rule for Daily Drift Detection
  DailyDriftDetectionRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-daily-drift-detection
      Description: Run drift detection daily
      ScheduleExpression: cron(0 8 * * ? *)
      State: ENABLED
      Targets:
        - Id: EvidentlyDriftTarget
          Arn: !GetAtt EvidentlyDriftFunction.Arn

  # Permission for EventBridge to invoke Evidently Lambda
  EvidentlyDriftEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EvidentlyDriftFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailyDriftDetectionRule.Arn

  # Log Group for API metrics
  APILogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/${ProjectName}/${Environment}/api
      RetentionInDays: 30
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-api-logs

  # Metric Filter for Error Count
  ErrorCountMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref APILogGroup
      FilterPattern: '[timestamp, requestId, level="ERROR", ...]'
      MetricTransformations:
        - MetricName: ErrorCount
          MetricNamespace: ToxicCommentAPI
          MetricValue: '1'

Outputs:
  AlertTopicArn:
    Description: SNS Alert Topic ARN
    Value: !Ref AlertTopic
    Export:
      Name: !Sub ${ProjectName}-${Environment}-AlertTopicArn

  DashboardName:
    Description: CloudWatch Dashboard name
    Value: !Ref MonitoringDashboard
    Export:
      Name: !Sub ${ProjectName}-${Environment}-DashboardName

  EvidentlyDriftFunctionArn:
    Description: Evidently drift detection Lambda ARN
    Value: !GetAtt EvidentlyDriftFunction.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-EvidentlyDriftFunctionArn

  APILogGroupName:
    Description: API Log Group name
    Value: !Ref APILogGroup
    Export:
      Name: !Sub ${ProjectName}-${Environment}-APILogGroupName

  HighErrorRateAlarmArn:
    Description: High error rate alarm ARN
    Value: !GetAtt HighErrorRateAlarm.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-HighErrorRateAlarmArn

  HighLatencyAlarmArn:
    Description: High latency alarm ARN
    Value: !GetAtt HighLatencyAlarm.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-HighLatencyAlarmArn

  DriftDetectedAlarmArn:
    Description: Drift detected alarm ARN
    Value: !GetAtt DriftDetectedAlarm.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-DriftDetectedAlarmArn
