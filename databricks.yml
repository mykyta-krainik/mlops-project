# Databricks Asset Bundle Configuration
# This bundle defines the MLOps training pipeline for toxic comment classification

bundle:
  name: mlops-toxic-comments
  
# Include configuration files
include:
  - resources/*.yml
  
# Variables that can be overridden
variables:
  catalog_name:
    description: Unity Catalog name
    default: mlops_catalog
  
  schema_name:
    description: Schema name within the catalog
    default: toxic_comments
  
  model_name:
    description: Model name in MLflow registry
    default: toxic-comment-classifier
  
  model_type:
    description: Model type to train (baseline or improved)
    default: baseline
  
  metric_threshold:
    description: Minimum improvement threshold for model promotion (percentage)
    default: 2.0
  
  cluster_node_type:
    description: Node type for compute cluster
    default: i3.xlarge

  notification_email:
    description: Email address for job notifications
    default: mykyta.krainik@gmail.com

# Targets for different environments
targets:
  dev:
    mode: development
    variables:
      catalog_name: mlops_catalog_dev
      schema_name: toxic_comments_dev
  
  prod:
    mode: production
    variables:
      catalog_name: mlops_catalog
      schema_name: toxic_comments
    
    # Production runs on schedule
    run_as:
      service_principal_name: ${var.service_principal_name}

# Resources
resources:
  jobs:
    training_pipeline:
      name: "[${bundle.target}] Toxic Comments Training Pipeline"
      
      # Weekly schedule: Saturday at 2 AM UTC
      schedule:
        quartz_cron_expression: "0 0 2 ? * SAT"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      
      # Email notifications
      email_notifications:
        on_failure:
          - ${var.notification_email}
      
      # Serverless compute environment
      environments:
        - environment_key: serverless_env
          spec:
            client: "2"
            dependencies:
              - ./dist/*.whl
              - evidently
      
      # Tasks using serverless compute with notebook jobs
      tasks:
        # Task 1: Data Ingestion
        - task_key: data_ingestion
          environment_key: serverless_env
          notebook_task:
            notebook_path: databricks/tasks/data_ingestion.py
            base_parameters:
              catalog: ${var.catalog_name}
              schema: ${var.schema_name}
        
        # Task 2: Feature Engineering
        - task_key: feature_engineering
          depends_on:
            - task_key: data_ingestion
          environment_key: serverless_env
          notebook_task:
            notebook_path: databricks/tasks/feature_engineering.py
            base_parameters:
              catalog: ${var.catalog_name}
              schema: ${var.schema_name}
        
        # Task 3: Model Training
        - task_key: train_model
          depends_on:
            - task_key: feature_engineering
          environment_key: serverless_env
          notebook_task:
            notebook_path: databricks/tasks/train_model.py
            base_parameters:
              catalog: ${var.catalog_name}
              schema: ${var.schema_name}
              model-type: ${var.model_type}
              model-name: ${var.model_name}
        
        # Task 4: Challenger (Model Comparison & Promotion)
        - task_key: challenger
          depends_on:
            - task_key: train_model
          environment_key: serverless_env
          notebook_task:
            notebook_path: databricks/tasks/challenger.py
            base_parameters:
              model-name: ${var.model_name}
              metric-threshold: ${var.metric_threshold}
        
        # Task 5: Deploy Model to Serving
        - task_key: deploy_model
          depends_on:
            - task_key: challenger
          environment_key: serverless_env
          notebook_task:
            notebook_path: databricks/tasks/deploy_model.py
            base_parameters:
              model-name: ${var.model_name}
              endpoint-name: toxic-comments-serving
      
      # Timeout and retry configuration
      timeout_seconds: 7200  # 2 hours
      max_concurrent_runs: 1
  
    drift_monitoring:
      name: "[${bundle.target}] Drift Monitoring"
      
      # Weekly schedule: Sunday at 3 AM UTC (after training)
      schedule:
        quartz_cron_expression: "0 0 3 ? * SUN"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      
      # Serverless compute environment
      environments:
        - environment_key: serverless_env
          spec:
            client: "2"
            dependencies:
              - ./dist/*.whl
              - evidently
      
      tasks:
        - task_key: drift_detection
          environment_key: serverless_env
          notebook_task:
            notebook_path: databricks/monitoring/drift_detection.py
            base_parameters:
              catalog: ${var.catalog_name}
              schema: ${var.schema_name}
      
      timeout_seconds: 3600  # 1 hour
      max_concurrent_runs: 1
  
  # MLflow Experiment
  experiments:
    toxic_comments_experiment:
      name: /Users/${workspace.current_user.userName}/mlops-project
      
  # Note: Models are registered to Unity Catalog via MLflow in the training tasks
  # No separate model registry resource needed
